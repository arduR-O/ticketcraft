databaseChangeLog:
  - changeSet:
      id: 1.2-add-location-coords-and-indexes
      author: arduR-O
      changes:
        # 1. Add coordinates columns to venues table
        - addColumn:
            tableName: venues
            columns:
              - column:
                  name: latitude
                  type: double precision
              - column:
                  name: longitude
                  type: double precision

        # 2. B-Tree index on venues location coordinates
        - createIndex:
            indexName: idx_venues_lat_lon
            tableName: venues
            columns:
              - column:
                  name: latitude
              - column:
                  name: longitude

        # 3. B-Tree indexes on events table
        - createIndex:
            indexName: idx_events_artist_id
            tableName: events
            columns:
              - column:
                  name: artist_id
        - createIndex:
            indexName: idx_events_venue_id
            tableName: events
            columns:
              - column:
                  name: venue_id
        - createIndex:
            indexName: idx_events_date
            tableName: events
            columns:
              - column:
                  name: date
        - createIndex:
            indexName: idx_events_artist_date
            tableName: events
            columns:
              - column:
                  name: artist_id
              - column:
                  name: date

        # 4. B-Tree indexes on seats table
        - createIndex:
            indexName: idx_seats_event_id
            tableName: seats
            columns:
              - column:
                  name: event_id
        - createIndex:
            indexName: idx_seats_event_status
            tableName: seats
            columns:
              - column:
                  name: event_id
              - column:
                  name: status
