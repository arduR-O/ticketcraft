databaseChangeLog:
  - changeSet:
      id: 1.1-create-fts-trigger
      author: ardur
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            stripComments: false
            sql: |
              CREATE OR REPLACE FUNCTION events_search_vector_trigger() 
              RETURNS trigger AS $$
              DECLARE
                  artist_name VARCHAR;
                  venue_name VARCHAR;
              BEGIN
                  SELECT name INTO artist_name FROM artists WHERE id = NEW.artist_id;
                  SELECT name INTO venue_name FROM venues WHERE id = NEW.venue_id;
                  
                  NEW.search_vector := 
                      setweight(to_tsvector('english', coalesce(NEW.title, '')), 'A') ||
                      setweight(to_tsvector('english', coalesce(artist_name, '')), 'B') ||
                      setweight(to_tsvector('english', coalesce(NEW.description, '')), 'C') ||
                      setweight(to_tsvector('english', coalesce(venue_name, '')), 'D');
                  RETURN NEW;
              END
              $$ LANGUAGE plpgsql;

              CREATE OR REPLACE TRIGGER trg_events_search_vector_update
              BEFORE INSERT OR UPDATE ON events
              FOR EACH ROW
              EXECUTE FUNCTION events_search_vector_trigger();
