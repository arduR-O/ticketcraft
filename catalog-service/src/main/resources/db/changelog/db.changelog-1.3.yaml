databaseChangeLog:
  - changeSet:
      id: 1.3-add-seat-coordinates-and-section
      author: arduR-O
      changes:
        # Add section, x_coordinate, and y_coordinate to seats table
        - addColumn:
            tableName: seats
            columns:
              - column:
                  name: section
                  type: varchar(100)
                  defaultValue: "General Admission"
                  constraints:
                    nullable: false
              - column:
                  name: x_coordinate
                  type: integer
              - column:
                  name: y_coordinate
                  type: integer
