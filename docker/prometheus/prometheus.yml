global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'spring-boot-apps'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8080' # gateway-service
          - 'host.docker.internal:8081' # catalog-service
          - 'host.docker.internal:8082' # booking-service
          - 'host.docker.internal:8083' # queue-service
          - 'host.docker.internal:8084' # payment-service
