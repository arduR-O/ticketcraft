server:
  port: 8083

spring:
  application:
    name: queue-service
  data:
    redis:
      host: localhost
      port: 6379
      password: redis

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

queue:
  jwt:
    secret: "ticketcraft_waiting_room_secret_key_32_bytes_long_minimum!"
  max-active-sessions: 10000
  heartbeat-grace-seconds: 15
