server:
  port: 8083

spring:
  application:
    name: queue-service
  data:
    redis:
      host: localhost
      port: 6379
      password: redis

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

queue:
  jwt:
    secret: "ticketcraft_waiting_room_secret_key_32_bytes_long_minimum!"
  max-active-sessions: 1 # For testing purpose
  # Demo purpose: 2s heartbeat grace (matches exactly 1 heartbeat cycle to simulate no extra grace). 
  # Prod will have a longer grace period to tolerate network jitter.
  heartbeat-grace-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}
