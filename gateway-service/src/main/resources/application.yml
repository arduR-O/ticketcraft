server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
      password: redis
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/gateway_db
    username: postgres
    password: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/gateway_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # ── Queue-pass-protected seatmap route ──
        - id: seatmap-with-pass
          uri: lb://catalog-service
          predicates:
            - Path=/api/v1/events/{id}/seatmap
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - QueuePassValidation
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ── Queue-pass-protected booking reservation route ──
        - id: booking-reserve-with-pass
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings
            - Method=POST
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - QueuePassValidation
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ── Authenticated booking status and checkout routes ──
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ── Public catalog routes (no queue pass needed) ──
        - id: catalog-search
          uri: lb://catalog-service
          predicates:
            - Path=/api/v1/events/search,/api/v1/events/nearby
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        - id: catalog-event-detail
          uri: lb://catalog-service
          predicates:
            - Path=/api/v1/events/{id}
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ── SSE seat-stream (public - no queue pass) ──
        - id: catalog-seat-stream
          uri: lb://catalog-service
          predicates:
            - Path=/api/v1/events/{id}/seat-stream
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - QueuePassValidation
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ── Queue Service route ──
        - id: queue-service
          uri: lb://queue-service
          predicates:
            - Path=/api/v1/queue/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ── Payment Service route ──
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true



queue:
  jwt:
    secret: "ticketcraft_waiting_room_secret_key_32_bytes_long_minimum!"
  max-active-sessions: 1 # For testing purpose

auth:
  jwt:
    secret: "ticketcraft_global_auth_secret_key_32_bytes_long_minimum!"

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}
