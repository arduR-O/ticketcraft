spring:
  main:
    allow-bean-definition-overriding: true
  r2dbc:
    url: r2dbc:h2:mem:///testdb;MODE=PostgreSQL
    username: sa
    password: ""
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test
            client-secret: test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: seatmap-with-pass
          uri: lb://catalog-service
          predicates:
            - Path=/api/events/{id}/seatmap
          filters:
            - QueuePassValidation

eureka:
  client:
    enabled: false

queue:
  jwt:
    secret: "ticketcraft_waiting_room_secret_key_32_bytes_long_minimum!"
  max-active-sessions: 10000

auth:
  jwt:
    secret: "ticketcraft_global_auth_secret_key_32_bytes_long_minimum!"
